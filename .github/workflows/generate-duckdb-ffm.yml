name: Generate DuckDB FFM Bindings

on:
  workflow_dispatch: # 允许你在 GitHub 页面上手动触发执行
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/generate-duckdb-ffm.yml' # 配置文件改动时触发

env:
  # 你可以根据需要修改 DuckDB 和 JDK 的版本
  DUCKDB_VERSION: "v1.1.3" 
  JAVA_VERSION: "21"
  # 对应 JDK 版本的 jextract 下载链接 (这里以 JDK 21 为例)
  JEXTRACT_URL: "https://download.java.net/java/early_access/jextract/21/2/openjdk-21-jextract+2-4_linux-x64_bin.tar.gz"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK ${{ env:JAVA_VERSION }}
      uses: actions/abstract/setup-java@v4 # 或者是 actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'

    - name: Install System Dependencies (Clang/LLVM)
      run: |
        sudo apt-get update
        sudo apt-get install -y libclang-dev llvm

    - name: Download and Setup jextract
      run: |
        wget ${{ env.JEXTRACT_URL }} -O jextract.tar.gz
        tar -xzf jextract.tar.gz
        echo "$(pwd)/jextract-21/bin" >> $GITHUB_PATH # 将 jextract 加入系统环境变量

    - name: Download DuckDB C-API (Header and Lib)
      run: |
        # 下载 Linux x86_64 版本的 DuckDB C-API
        wget https://github.com/duckdb/duckdb/releases/download/${{ env.DUCKDB_VERSION }}/libduckdb-linux-amd64.zip
        unzip libduckdb-linux-amd64.zip -d duckdb-native
        ls -la duckdb-native # 确认 duckdb.h 和 libduckdb.so 存在

    - name: Run jextract to Generate Java FFM Code
      run: |
        # 创建输出目录
        mkdir -p src/main/java
        
        # 执行核心解析与代码生成
        jextract --output src/main/java \
                 --target-package org.duckdb.ffi \
                 -I duckdb-native \
                 duckdb-native/duckdb.h

    - name: Clean up temporary files
      run: |
        rm -rf jextract.tar.gz libduckdb-linux-amd64.zip

    # 自动将生成的纯 Java 代码提交并推送到你的 GitHub 仓库
    - name: Commit and Push Generated Code
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add src/main/java/org/duckdb/ffi
        
        # 检查是否有代码变动，有则提交
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "chore: auto-generate DuckDB FFM bindings for ${{ env.DUCKDB_VERSION }}"
          git push
        fi
